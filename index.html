<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Logístico</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body>

<h1>📊 Painel Gerencial</h1>

<form id="formulario">

<input type="date" id="data" required>

<select id="predio">
<option>T&C</option>
<option>Body</option>
<option>Stamp</option>
<option>PWT</option>
</select>

<select id="doca">
<option>1C</option>
<option>1T</option>
<option>1K</option>
<option>1G</option>
<option>1B</option>
<option>30</option>
</select>

<input type="number" id="parada" placeholder="Parada (min)">
<input type="text" id="motivoParada" placeholder="Motivo">
<input type="text" id="causaParada" placeholder="Causa">

<input type="number" id="recLocal" placeholder="Receb. Local">
<input type="number" id="recImportado" placeholder="Receb. Importado">

<input type="number" id="absenteismo" placeholder="Absenteísmo">
<input type="text" id="motivoAbs" placeholder="Motivo Abs">
<input type="date" id="retornoAbs">

<input type="number" id="acidentes" placeholder="Acidentes">

<button type="submit">Salvar</button>

</form>

<hr>

<input type="date" id="filtroData">
<button onclick="filtrarData()">Filtrar Data</button>
<button onclick="exportarExcel()">Exportar Excel</button>
<button onclick="abrirFiltroPredio()">Filtrar Prédio</button>

<div id="kpisDia"></div>

<table id="tabela">
<thead>
<tr>
<th>Data</th>
<th>Prédio</th>
<th>Doca</th>
<th>Parada</th>
<th>Motivo</th>
<th>Causa</th>
<th>Abs</th>
<th>Retorno</th>
<th>Local</th>
<th>Importado</th>
</tr>
</thead>
<tbody id="historico"></tbody>
</table>

<div id="painelFiltro" style="display:none;">
<button onclick="filtrarPorGrupo('TC')">T&C</button>
<button onclick="filtrarPorGrupo('OUTROS')">Body/Stamp/PWT</button>
</div>

<div id="resultadoGrupo"></div>

<canvas id="graficoDocas"></canvas>

<script src="script.js"></script>

</body>
</html>
