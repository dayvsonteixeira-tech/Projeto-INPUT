<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Gerencial Logístico</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<h1>📊 Painel Gerencial Logístico</h1>

<form id="formulario">
  <input type="date" id="data" required>
  <select id="predio">
    <option>T&C</option>
    <option>Body</option>
    <option>Stamp</option>
    <option>PWT</option>
  </select>
  <select id="doca">
    <option>1C</option>
    <option>1T</option>
    <option>1K</option>
    <option>1G</option>
    <option>1B</option>
    <option>30</option>
  </select>

  <input type="number" id="parada" placeholder="Parada de Linha (min)">
  <input type="text" id="motivoParada" placeholder="Motivo">
  <input type="text" id="causaParada" placeholder="Causa">

  <input type="number" id="recLocal" placeholder="🚚 Caminhão">
  <input type="number" id="recImportado" placeholder="🌍 Importado">

  <input type="number" id="absenteismo" placeholder="Absenteísmo">
  <input type="text" id="motivoAbs" placeholder="Motivo Absenteísmo">

  <input type="number" id="acidentes" placeholder="⚠️ Segurança">

  <button type="submit">💾 Salvar</button>
</form>

<hr>

<div class="acoes">
  <input type="date" id="filtroData">
  <button onclick="filtrarData()">🔍 Filtrar por Data</button>
  <button onclick="exportarExcel()">📥 Exportar Excel</button>
  <button onclick="abrirFiltroPredio()">🏢 Filtrar por Prédio</button>
</div>

<div id="kpisDia" style="display:none;"></div>

<div style="overflow-x:auto;">
<table id="tabela" style="display:none;">
  <thead>
    <tr>
      <th>📅 Data</th>
      <th>🏢 Prédio</th>
      <th>🚪 Doca</th>
      <th>⏱ Linha Parada</th>
      <th>📌 Motivo</th>
      <th>⚙️ Causa</th>
      <th>👥 Absenteísmo</th>
      <th>⚠️ Segurança</th>
      <th>🚚 Caminhão</th>
      <th>🌍 Importado</th>
    </tr>
  </thead>
  <tbody id="historico"></tbody>
</table>
</div>

<div id="painelFiltro" style="display:none;">
  <p>🏢 Escolha o grupo:</p>
  <button onclick="filtrarPorGrupo('TC')">T&C</button>
  <button onclick="filtrarPorGrupo('OUTROS')">Body/Stamp/PWT</button>
</div>

<div id="resultadoGrupo"></div>

<h2>Gráficos</h2>
<canvas id="graficoParadaLinha" style="width:100%; height:300px;"></canvas>
<canvas id="graficoRecebimentoLocal" style="width:100%; height:300px;"></canvas>
<canvas id="graficoRecebimentoImportado" style="width:100%; height:300px;"></canvas>
<canvas id="graficoAbsenteismo" style="width:100%; height:300px;"></canvas>
<canvas id="graficoSeguranca" style="width:100%; height:300px;"></canvas>
<canvas id="graficoPorPredio" style="width:100%; height:300px;"></canvas>
<canvas id="graficoPorDia" style="width:100%; height:300px;"></canvas>

<script src="script.js"></script>
</body>
</html>
